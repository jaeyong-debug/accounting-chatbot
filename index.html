<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회계팀 챗봇 - 키다리스튜디오 레진엔터테인먼트</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f1f5f9;height:100dvh;display:flex;flex-direction:column;color:#1e293b}
.header{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;padding:16px 20px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.header h1{font-size:16px;font-weight:700;line-height:1.4}
.header p{font-size:12px;opacity:.85;margin-top:2px}
.quick-area{padding:12px 16px 4px;flex-shrink:0;overflow-x:auto;white-space:nowrap}
.quick-area::-webkit-scrollbar{display:none}
.quick-btn{display:inline-block;padding:7px 14px;margin:0 5px 8px 0;background:#fff;border:1px solid #e2e8f0;border-radius:20px;font-size:13px;color:#2563eb;cursor:pointer;font-weight:500}
.quick-btn:hover{background:#2563eb;color:#fff}
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg-row{display:flex;gap:8px;max-width:88%;animation:fadeUp .25s ease}
.msg-row.bot{align-self:flex-start}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.bot .avatar{background:linear-gradient(135deg,#2563eb,#7c3aed)}
.user .avatar{background:#475569}
.bubble{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.65;word-break:keep-all}
.bot .bubble{background:#fff;border:1px solid #e2e8f0;border-top-left-radius:4px}
.user .bubble{background:#2563eb;color:#fff;border-top-right-radius:4px}
.bubble strong{color:#2563eb;font-weight:600}
.user .bubble strong{color:#e0e7ff}
.info-box{margin-top:8px;padding:8px 12px;background:#f0f4ff;border-radius:8px;font-size:13px;border-left:3px solid #2563eb}
.input-area{padding:12px 16px;background:#fff;border-top:1px solid #e2e8f0;flex-shrink:0;display:flex;gap:8px}
.input-area input{flex:1;padding:10px 16px;border:1px solid #e2e8f0;border-radius:24px;font-size:14px;outline:none}
.input-area input:focus{border-color:#2563eb}
.input-area button{width:42px;height:42px;border:none;border-radius:50%;background:#2563eb;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.typing{display:flex;gap:4px;padding:12px 14px}
.typing span{width:7px;height:7px;background:#94a3b8;border-radius:50%;animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{to{opacity:.3;transform:translateY(-4px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
.chat-area::-webkit-scrollbar{width:4px}.chat-area::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
@media(min-width:600px){body{max-width:480px;margin:0 auto;border-left:1px solid #e2e8f0;border-right:1px solid #e2e8f0}}
</style>
</head>
<body>
<div class="header">
<h1>키다리스튜디오 레진엔터테인먼트 회계팀 챗봇</h1>
<p>업무 관련 궁금한 점을 물어보세요</p>
</div>
<div class="quick-area" id="Q">
<span class="quick-btn" data-q="전표 처리 방법">전표처리</span>
<span class="quick-btn" data-q="담당자 확인">담당자 확인</span>
<span class="quick-btn" data-q="경비 정산">경비정산</span>
<span class="quick-btn" data-q="세금계산서 발행">세금계산서</span>
<span class="quick-btn" data-q="법인카드 분실">카드분실</span>
<span class="quick-btn" data-q="부가세 신고 일정">부가세일정</span>
<span class="quick-btn" data-q="해외출장비 정산">해외출장비</span>
<span class="quick-btn" data-q="경조사비 신청">경조사비</span>
</div>
<div class="chat-area" id="CA"></div>
<div class="input-area">
<input type="text" id="UI" placeholder="질문을 입력하세요" autocomplete="off">
<button id="SB"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
</div>
<script>
const C=document.getElementById('CA'),U=document.getElementById('UI'),S=document.getElementById('SB'),Q=document.getElementById('Q');
const M=[{k:['법인카드'],n:'오민지 매니저',a:'법인카드'},{k:['키다리스튜디오','키다리'],n:'유지수 매니저',a:'키다리스튜디오'},{k:['레진엔터','레진코믹스'],n:'고수희 매니저',a:'레진엔터/레진코믹스'},{k:['delitoon sas','프랑스'],n:'민지영 매니저',a:'DELITOON SAS(프랑스)'},{k:['delitoon japan','일본'],n:'민지영 매니저',a:'DELITOON Japan'},{k:['kidari entertainment','미국'],n:'김재용 팀장',a:'Kidari Entertainment(미국)'},{k:['해외법인'],n:'김재용 팀장',a:'해외법인 전반'},{k:['세무조정','세무'],n:'김재용 팀장',a:'세무조정/부가세'},{k:['급여','원천세','연말정산'],n:'최온아 매니저',a:'급여/원천세'},{k:['레진 정산','정산 레진'],n:'김민정 매니저',a:'정산(레진)'},{k:['키다리 정산','델리툰 정산'],n:'남우영 매니저',a:'정산(키다리/DELITOON)'}];
const R=[{k:['전표'],v:'전표 처리: ERP에서 전표 입력 후 결재라인을 따라 승인받으세요.<div class="info-box">결재: 담당자 → 팀장 → 부서장</div>'},{k:['세금계산서','계산서'],v:'세금계산서는 익월 10일까지 발행해야 합니다. ERP에서 발행하세요.'},{k:['경비정산','경비 정산','지출결의'],v:'경비 정산: 법인카드는 ERP 사용내역 정리 후 전표처리, 개인경비는 지출결의서를 작성하세요.'},{k:['카드분실','카드 분실'],v:'법인카드 분실 시 즉시 카드사에 분실신고 후 <strong>오민지 매니저</strong>에게 연락하세요.'},{k:['경조사','경조사비'],v:'경조사비: 증빙서류와 함께 인재문화팀에 신청하시면 회계팀에서 지급 처리합니다.'},{k:['해외출장','출장비'],v:'해외출장비: 복귀 후 7일 이내 환율 적용 정산서와 영수증을 제출해 주세요.<div class="info-box">정산서 → 환율적용 → 전표처리</div>'},{k:['부가세','부가가치세'],v:'부가세 신고일정: 1기예정 4/25, 1기확정 7/25, 2기예정 10/25, 2기확정 다음해 1/25 (담당: 김재용 팀장)'},{k:['전결'],v:'전결규정은 경영관리부 소관입니다. 경영관리부로 문의해 주세요.'}];
const D=[{k:['인사','휴가','연차','채용'],d:'인재문화팀'},{k:['법무','계약'],d:'법무팀'},{k:['it','시스템','서버'],d:'IT개발팀'}];
function fa(txt){const t=txt.toLowerCase().replace(/s+/g,' ').trim();if(/담당자|누구.*담당|연락처/.test(t)){for(const m of M)if(m.k.some(k=>t.includes(k)))return m.a+' 담당자는 <strong>'+m.n+'</strong>입니다.';let h='<strong>사업부별 담당자</strong><br><br><table style="width:100%;font-size:13px;border-collapse:collapse">';M.forEach(m=>{h+='<tr><td style="padding:4px 6px;border-bottom:1px solid #e2e8f0">'+m.a+'</td><td style="padding:4px 6px;border-bottom:1px solid #e2e8f0;font-weight:600">'+m.n+'</td></tr>';});return h+'</table>';}for(const r of R)if(r.k.some(k=>t.includes(k)))return r.v;for(const d of D)if(d.k.some(k=>t.includes(k)))return'해당 문의는 <strong>'+d.d+'</strong> 소관입니다.';if(/정산/.test(t))return'레진 정산: <strong>김민정 매니저</strong> / 키다리 DELITOON 정산: <strong>남우영 매니저</strong>';return null;}
function add(html,u){const r=document.createElement('div');r.className='msg-row '+(u?'user':'bot');r.innerHTML='<div class="avatar">'+(u?'나':'회')+'</div><div class="bubble">'+html+'</div>';C.appendChild(r);C.scrollTop=C.scrollHeight;}
function tp(on){if(on){const r=document.createElement('div');r.className='msg-row bot';r.id='tp';r.innerHTML='<div class="avatar">회</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';C.appendChild(r);C.scrollTop=C.scrollHeight;}else{const e=document.getElementById('tp');if(e)e.remove();}}
function send(){const v=U.value.trim();if(!v)return;add(v,1);U.value='';tp(1);setTimeout(()=>{tp(0);add(fa(v)||'죄송합니다. 회계팀에 직접 문의해 주세요.',0);},600+Math.random()*400);}
S.addEventListener('click',send);U.addEventListener('keydown',e=>{if(e.key==='Enter')send();});Q.addEventListener('click',e=>{const b=e.target.closest('.quick-btn');if(b){U.value=b.dataset.q;send();}});
setTimeout(()=>add('안녕하세요! 키다리스튜디오 레진엔터테인먼트 회계팀 챗봇입니다. 버튼을 누르거나 직접 입력해 주세요.',0),300);
</script>
</body>
</html>
