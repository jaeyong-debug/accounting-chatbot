<style>

  :root {

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
    color: #fff; padding: 16px 20px; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,.12);
  }
  .header h1 { font-size: 16px; font-weight: 700; line-height: 1.4; }
  .header p  { font-size: 12px; opacity: .85; margin-top: 2px; }

  /* Quick buttons */
  .quick-area { padding: 12px 16px 4px; flex-shrink: 0; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
  .quick-area::-webkit-scrollbar { display: none; }
  .quick-btn {
    display: inline-block; padding: 7px 14px; margin: 0 5px 8px 0;
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    font-size: 13px; color: var(--primary); cursor: pointer; transition: all .15s;
    font-weight: 500; text-decoration: none;
  }
  .quick-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
  .quick-btn.mail-btn { color: #059669; border-color: #a7f3d0; }
  .quick-btn.mail-btn:hover { background: #059669; color: #fff; border-color: #059669; }

  /* Chat area */
  .chat-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  .msg-row { display: flex; gap: 8px; max-width: 88%; animation: fadeUp .25s ease; }
  .msg-row.bot { align-self: flex-start; }
  .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
  }
  .bot .avatar { background: linear-gradient(135deg, var(--primary), #7c3aed); }
  .user .avatar { background: #475569; }

  .bubble {
    padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.65;
    word-break: keep-all; overflow-wrap: break-word;
  }
  .bot .bubble { background: var(--card); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .user .bubble { background: var(--user-bg); color: #fff; border-top-right-radius: 4px; }

  .bubble strong { color: var(--primary); font-weight: 600; }
  .user .bubble strong { color: #e0e7ff; }

  .bubble .info-box {
    margin-top: 8px; padding: 8px 12px; background: #f0f4ff; border-radius: 8px;
    font-size: 13px; border-left: 3px solid var(--primary);
  }

  .bubble table { width: 100%; font-size: 13px; border-collapse: collapse; margin-top: 6px; }
  .bubble table td { padding: 5px 8px; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
  .bubble table tr:last-child td { border-bottom: none; }
  .bubble table .td-area { color: #475569; font-size: 12px; }
  .bubble table .td-name { font-weight: 600; color: #1e293b; white-space: nowrap; }

  /* Input area */
  .input-area {
    padding: 12px 16px; background: var(--card); border-top: 1px solid var(--border);
    flex-shrink: 0; display: flex; gap: 8px;
  }
  .input-area input {
    flex: 1; padding: 10px 16px; border: 1px solid var(--border); border-radius: 24px;
    font-size: 14px; outline: none; transition: border .15s;
  }
  .input-area input:focus { border-color: var(--primary); }
  .input-area button {
    width: 42px; height: 42px; border: none; border-radius: 50%;
    background: var(--primary); color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: background .15s; flex-shrink: 0;
  }
  .input-area button:hover { background: var(--primary-dark); }
  .input-area button svg { width: 18px; height: 18px; }

  /* Typing indicator */
  .typing { display: flex; gap: 4px; padding: 12px 14px; }
  .typing span { width: 7px; height: 7px; background: #94a3b8; border-radius: 50%; animation: bounce .6s infinite alternate; }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }

  @keyframes bounce { to { opacity: .3; transform: translateY(-4px); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Scrollbar */
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

  @media (min-width: 600px) {
    body { max-width: 480px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

const routing = [
  { keys: ['인사','복리후생','휴가','연차','복지','채용'], dept: '인재문화팀' },
  { keys: ['법무','계약','법률','소송','nda'], dept: '법무팀' },
  { keys: ['it','시스템','서버','개발','vpn','계정'], dept: 'IT개발팀' },
];

/* ────────────────────────────────────────────
   키워드 매칭
──────────────────────────────────────────── */
function findAnswer(text) {
  const t = text.toLowerCase().replace(/\s+/g,' ').trim();

  /* 담당자 전체 보기 */
  if (/^담당자\s*(확인|보기|알려|목록|전체)?$/.test(t) || t === '담당자') {
    return buildAllManagerTable();
  }

  /* 담당자 + 특정 키워드 */
  if (/담당자|담당 ?자|누구.*담당|담당.*누구|연락처|담당자.*알려|담당.*문의/.test(t)) {
    for (const m of managers) {
      if (m.keys.some(k => t.includes(k.toLowerCase()))) {
        return `👤 <strong>${m.area}</strong> 담당자는 <strong>${m.name}</strong>입니다.`;
      }
    }
    return buildAllManagerTable();
  }

  /* 특정 사업부/법인 키워드 단독 언급 + 담당 관련 */
  for (const m of managers) {
    if (m.keys.some(k => t.includes(k.toLowerCase()))) {
      if (/담당|누구|연락|문의|담당자/.test(t)) {
        return `👤 <strong>${m.area}</strong> 담당자는 <strong>${m.name}</strong>입니다.`;
      }
    }
  }

  /* Q&A 규칙 */
  for (const r of qaRules) {
    if (r.keys.some(k => t.includes(k.toLowerCase()))) return r.answer;
  }

  /* 법인카드 general */
  if (/법인카드/.test(t)) {
    return '💳 <strong>법인카드 담당자 안내</strong><br><br>• 키다리법인 카드: <strong>유지수 매니저</strong><br>• 레진법인 카드: <strong>김민정(B) 매니저</strong><div class="info-box">법인카드 전표 처리 관련 문의는 해당 법인 담당자에게 연락해 주세요</div>';
  }

  /* 정산 general */
  if (/정산/.test(t)) {
    return '💰 <strong>정산 담당자 안내</strong><br><br>• 레진 정산: <strong>김민정(B) 매니저</strong><br>• 키다리 / DELITOON 정산: <strong>남우영 매니저</strong><br><br>해당 담당자에게 문의해 주세요.';
  }

  /* 부서 라우팅 */
  for (const r of routing) {
    if (r.keys.some(k => t.includes(k.toLowerCase()))) {
      return `📌 해당 문의는 <strong>${r.dept}</strong> 소관입니다.<br>${r.dept}으로 직접 문의해 주시기 바랍니다.`;
    }
  }

  return null;
}

function buildAllManagerTable() {
  let html = '👤 <strong>사업부별 담당자 안내</strong> <span style="font-size:11px;color:#94a3b8">(2026.03.16 기준)</span><br>';
  html += '<table><tbody>';
  allManagerTable.forEach(m => {
    html += `<tr><td class="td-area">${m.area}</td><td class="td-name">${m.name}</td></tr>`;
  });
  html += '</tbody></table>';
  return html;
}

/* ────────────────────────────────────────────
   UI
──────────────────────────────────────────── */
function addMessage(html, isUser) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + (isUser ? 'user' : 'bot');
  const initials = isUser ? '나' : '회';
  row.innerHTML = `<div class="avatar">${initials}</div><div class="bubble">${html}</div>`;
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row bot'; row.id = 'typing';
  row.innerHTML = '<div class="avatar">회</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
}
function hideTyping() { const el = document.getElementById('typing'); if (el) el.remove(); }

function handleSend() {
  const text = userInput.value.trim();
  if (!text) return;
  addMessage(text, true);
  userInput.value = '';
  showTyping();
  setTimeout(() => {
    hideTyping();
    const answer = findAnswer(text);
    addMessage(answer || '죄송합니다. 해당 질문에 대한 답변을 찾지 못했습니다.<br><br>더 궁금한 사항은 아래 버튼으로 직접 문의해 주세요 😊<br><br><a href="mailto:jaeyong@kidaristudio.com?subject=회계팀 챗봇 - 기타 문의사항" style="display:inline-block;margin-top:6px;padding:7px 16px;background:#059669;color:#fff;border-radius:20px;text-decoration:none;font-size:13px;font-weight:600;">✉️ 이외의 문의사항 메일 보내기</a>', false);
  }, 400 + Math.random() * 300);
}

sendBtn.addEventListener('click', handleSend);
userInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });
quickArea.addEventListener('click', e => {
  const btn = e.target.closest('.quick-btn[data-q]');
  if (!btn) return;
  userInput.value = btn.dataset.q;
  handleSend();
});
