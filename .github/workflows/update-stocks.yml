name: 📈 주식 데이터 자동 업데이트

on:
  schedule:
    - cron: '0,30 * * * *'   # 매 정시·30분마다 실행
  workflow_dispatch:          # 수동 실행도 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install yfinance pytz

      - name: 주식 데이터 수집 및 HTML 생성
        run: python scripts/update_stocks.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "Stock Bot 🤖"
          git config user.email "actions@github.com"
          git add stock-picks.html
          git diff --staged --quiet || git commit -m "📈 주식 데이터 자동 업데이트 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
          git push
